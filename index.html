<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SensePlay Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        nunito: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        'sp-blue': '#87CEEB',
                        'sp-green': '#98FB98',
                        'sp-yellow': '#FFFACD',
                        'sp-pink': '#FFB6C1',
                        'sp-purple': '#DDA0DD',
                        'sp-orange': '#FFDAB9'
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s infinite',
                        'pulse-fast': 'pulse 1s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-5deg)' },
                            '50%': { transform: 'rotate(5deg)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f8ff;
            user-select: none; /* Prevent text selection */
            -webkit-user-select: none;
            touch-action: manipulation; /* Prevent double-tap zoom */
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .btn-game {
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
        }
        .btn-game:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.15);
        }
        .star-particle {
            position: absolute;
            font-size: 2rem;
            animation: fall 2s linear forwards;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .selected-item {
            box-shadow: 0 0 0 6px #FFD700;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="w-full h-screen flex justify-center items-center">

    <!-- Main Container -->
    <div id="app" class="relative w-full max-w-md h-full sm:h-[85vh] sm:rounded-3xl shadow-2xl bg-gradient-to-b from-sp-blue to-white overflow-hidden flex flex-col">
        <!-- Dynamic Content Injected Here -->
    </div>

    <script>
        // Game State
        const state = {
            currentScreen: 'menu', // menu, map, play, reward, dashboard
            currentWorld: null,
            progress: {
                honesty: { stars: 0, unlocked: true },
                discipline: { stars: 0, unlocked: false },
                responsibility: { stars: 0, unlocked: false },
                care: { stars: 0, unlocked: false },
                cooperation: { stars: 0, unlocked: false }
            },
            totalStars: 0
        };

        // World Definitions
        const worlds = [
            { id: 'honesty', name: 'Hutan Kejujuran', color: 'bg-sp-green', icon: '🐻', lockedMsg: 'Selesaikan sebelumnya!', desc: 'Kembalikan barang ke pemiliknya.' },
            { id: 'responsibility', name: 'Pulau Tanggung Jawab', color: 'bg-sp-orange', icon: '🧸', lockedMsg: 'Dapatkan 1 bintang di Hutan Kejujuran', desc: 'Bereskan mainan yang berserakan.' },
            { id: 'discipline', name: 'Kota Disiplin', color: 'bg-sp-blue', icon: '⏱️', lockedMsg: 'Segera Hadir!', desc: 'Datang tepat waktu ke sekolah.' },
            { id: 'care', name: 'Taman Kepedulian', color: 'bg-sp-pink', icon: '💖', lockedMsg: 'Segera Hadir!', desc: 'Bantu teman yang kesulitan.' },
            { id: 'cooperation', name: 'Desa Kerja Sama', color: 'bg-sp-purple', icon: '🤝', lockedMsg: 'Segera Hadir!', desc: 'Selesaikan misi bersama-sama.' }
        ];

        // Audio System
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.5, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'pop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'error') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(250, now + 0.2);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        // Voice Narration
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop current speaking
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID';
                utterance.pitch = 1.3; // Cute voice
                utterance.rate = 0.9;  // Slightly slower for kids
                window.speechSynthesis.speak(utterance);
            }
        }

        // Particle Effects
        function createConfetti() {
            const app = document.getElementById('app');
            const emojis = ['⭐', '🌟', '✨', '🎉'];
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.className = 'star-particle';
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                app.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }
        }

        const app = document.getElementById('app');

        function render() {
            app.innerHTML = ''; // Clear current view
            
            switch(state.currentScreen) {
                case 'menu': renderMenu(); break;
                case 'map': renderMap(); break;
                case 'play': renderLevel(); break;
                case 'reward': renderReward(); break;
                case 'dashboard': renderDashboard(); break;
            }
        }

        function changeScreen(screen, arg = null) {
            initAudio(); // Ensure audio is unlocked
            state.currentScreen = screen;
            if (arg) state.currentWorld = arg;
            playSound('pop');
            render();
        }

        function renderMenu() {
            speak("Selamat datang di Sense Play Adventure! Ayo bermain bersama!");
            
            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 animate-pop relative">
                    <!-- Clouds decoration -->
                    <div class="absolute top-10 left-4 text-6xl opacity-80 animate-pulse-fast">☁️</div>
                    <div class="absolute top-20 right-4 text-5xl opacity-80 animate-wiggle">☁️</div>

                    <div class="text-7xl mb-4 animate-bounce-slow">🦁</div>
                    <h1 class="text-4xl font-black text-center text-blue-600 mb-2 drop-shadow-md border-white">SensePlay<br>Adventure</h1>
                    <p class="text-center text-gray-700 font-bold mb-8">Main sambil belajar jadi anak hebat!</p>
                    
                    <button onclick="changeScreen('map')" class="btn-game bg-green-400 text-white text-3xl font-black py-4 px-12 rounded-full border-4 border-white mb-6">
                        MAIN! 🚀
                    </button>
                    
                    <button onclick="changeScreen('dashboard')" class="bg-white/50 text-gray-600 font-bold py-2 px-6 rounded-full flex items-center gap-2 hover:bg-white/80 transition">
                        <span>📊</span> Area Orang Tua
                    </button>
                </div>
            `;
        }

        function renderMap() {
            speak("Pilih dunia yang ingin kamu kunjungi!");
            
            let html = `
                <div class="p-6 h-full flex flex-col animate-pop">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changeScreen('menu')" class="bg-white p-3 rounded-full shadow-md text-xl">🏠</button>
                        <div class="bg-yellow-300 px-4 py-2 rounded-full font-black text-yellow-800 flex items-center gap-2 shadow-md">
                            ⭐ ${state.totalStars}
                        </div>
                    </div>
                    <h2 class="text-2xl font-black text-center text-blue-700 mb-6 bg-white/70 rounded-full py-2">Peta Petualangan 🗺️</h2>
                    
                    <div class="flex-1 overflow-y-auto space-y-4 pb-10">
            `;

            worlds.forEach(w => {
                const isUnlocked = state.progress[w.id].unlocked;
                const stars = state.progress[w.id].stars;
                
                html += `
                    <div class="glass-panel p-4 rounded-3xl flex items-center gap-4 ${isUnlocked ? 'cursor-pointer hover:scale-105 transition-transform' : 'opacity-60 grayscale'}"
                         onclick="if(${isUnlocked}) { ${w.id === 'honesty' || w.id === 'responsibility' ? `changeScreen('play', '${w.id}')` : `alertCustom('Dunia ini sedang dibangun! Mainkan dunia yang lain ya.')`} } else { alertCustom('${w.lockedMsg}') }">
                        <div class="${w.color} w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-inner border-2 border-white">
                            ${isUnlocked ? w.icon : '🔒'}
                        </div>
                        <div class="flex-1">
                            <h3 class="font-black text-gray-800 text-lg">${w.name}</h3>
                            <p class="text-sm text-gray-600 leading-tight">${w.desc}</p>
                            ${isUnlocked ? `<div class="text-yellow-500 mt-1">${'⭐'.repeat(stars)}${'☆'.repeat(3 - stars)}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
                
                <!-- Custom Alert Overlay (Hidden by default) -->
                <div id="customAlert" class="absolute inset-0 bg-black/50 hidden flex items-center justify-center z-50">
                    <div class="bg-white p-6 rounded-3xl max-w-[80%] text-center animate-pop">
                        <p id="alertMsg" class="font-bold text-lg mb-4"></p>
                        <button onclick="document.getElementById('customAlert').classList.add('hidden')" class="bg-blue-400 text-white font-bold py-2 px-6 rounded-full">Oke!</button>
                    </div>
                </div>
            `;
            
            app.innerHTML = html;
        }

        function alertCustom(msg) {
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlert').classList.remove('hidden');
            speak(msg);
        }

        let gameData = {};

        function renderLevel() {
            if (state.currentWorld === 'honesty') {
                initHonestyGame();
            } else if (state.currentWorld === 'responsibility') {
                initResponsibilityGame();
            }
        }

        function initHonestyGame() {
            speak("Hutan Kejujuran. Ketuk barang yang hilang, lalu ketuk hewan pemiliknya!");
            
            gameData = {
                selectedItem: null,
                matchesLeft: 2,
                items: [
                    { id: 'apple', icon: '🍎', owner: 'bear', name: 'Apel' },
                    { id: 'bone', icon: '🦴', owner: 'dog', name: 'Tulang' }
                ],
                owners: [
                    { id: 'dog', icon: '🐶', name: 'Anjing', expects: 'bone', solved: false },
                    { id: 'bear', icon: '🐻', name: 'Beruang', expects: 'apple', solved: false }
                ]
            };
            
            drawHonestyGame();
        }

        function drawHonestyGame() {
            let html = `
                <div class="p-4 h-full flex flex-col bg-sp-green animate-pop relative">
                    <div class="flex justify-between items-center mb-2">
                        <button onclick="changeScreen('map')" class="bg-white p-3 rounded-full shadow-md">🔙</button>
                        <h2 class="font-black text-green-800 bg-white/70 px-4 py-1 rounded-full text-lg">Hutan Kejujuran 🌲</h2>
                    </div>
                    
                    <p class="text-center font-bold text-green-900 mb-4 bg-white/50 p-2 rounded-xl">Bantu kembalikan barang ke pemiliknya!</p>

                    <!-- Owners Area (Top) -->
                    <div class="flex justify-around items-end h-1/3 mb-4 border-b-4 border-green-700/20 pb-4">
            `;

            gameData.owners.forEach((o, index) => {
                html += `
                    <div id="owner-${o.id}" class="text-center transition-all duration-300" onclick="handleOwnerTap('${o.id}')">
                        <div class="text-7xl mb-2 ${o.solved ? 'animate-bounce-slow' : 'animate-pulse-fast'}">${o.icon}</div>
                        <div class="bg-white/80 px-3 py-1 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                            ${o.solved ? o.icon : '❓'} ${o.solved ? 'Senang!' : 'Sedih'}
                        </div>
                    </div>
                `;
            });

            html += `</div>
                    <!-- Items Area (Bottom) -->
                    <div class="flex justify-around items-center h-1/3 bg-white/40 rounded-3xl p-4 border-4 border-white dashed">
            `;

            gameData.items.forEach(i => {
                html += `
                    <div id="item-${i.id}" class="btn-game bg-white w-24 h-24 rounded-2xl shadow-md flex justify-center items-center text-6xl cursor-pointer ${gameData.selectedItem === i.id ? 'selected-item' : ''}" onclick="handleItemTap('${i.id}')">
                        ${i.icon}
                    </div>
                `;
            });

            html += `</div></div>`;
            app.innerHTML = html;
        }

        window.handleItemTap = function(itemId) {
            if (gameData.items.find(i => i.id === itemId).solved) return;
            gameData.selectedItem = itemId;
            playSound('pop');
            drawHonestyGame(); // Redraw to show selection
            speak(`Kamu memilih ${gameData.items.find(i => i.id === itemId).name}. Punya siapa ini ya?`);
        };

        window.handleOwnerTap = function(ownerId) {
            if (!gameData.selectedItem) {
                speak("Pilih barangnya dulu ya!");
                return;
            }

            const owner = gameData.owners.find(o => o.id === ownerId);
            const item = gameData.items.find(i => i.id === gameData.selectedItem);

            if (owner.expects === gameData.selectedItem) {
                // Correct Match
                playSound('success');
                owner.solved = true;
                owner.icon = owner.icon.replace('🐶', '🐕').replace('🐻', '🧸'); // Change appearance slightly if possible, or just animate
                
                // Remove item from array
                gameData.items = gameData.items.filter(i => i.id !== gameData.selectedItem);
                gameData.selectedItem = null;
                gameData.matchesLeft--;
                
                speak(`Pintar! ${item.name} memang milik ${owner.name}. Kamu anak jujur!`);
                drawHonestyGame();

                if (gameData.matchesLeft === 0) {
                    setTimeout(() => winLevel(3, "Hebat! Kamu sudah menunjukkan sikap jujur dengan mengembalikan barang milik orang lain."), 1500);
                }
            } else {
                // Wrong Match - Gentle correction
                playSound('error');
                const ownerEl = document.getElementById(`owner-${ownerId}`);
                ownerEl.classList.add('shake');
                setTimeout(() => ownerEl.classList.remove('shake'), 500);
                gameData.selectedItem = null;
                drawHonestyGame();
                speak(`Sepertinya ${item.name} bukan milik ${owner.name}. Yuk coba cari pemilik aslinya!`);
            }
        };

        function initResponsibilityGame() {
            speak("Pulau Tanggung Jawab. Ketuk mainan yang berserakan untuk merapikannya ke dalam kotak!");
            
            gameData = {
                toysLeft: 3,
                toys: [
                    { id: 't1', icon: '🚗', top: '20%', left: '10%' },
                    { id: 't2', icon: '⚽', top: '40%', left: '70%' },
                    { id: 't3', icon: '🧸', top: '60%', left: '20%' }
                ]
            };
            drawResponsibilityGame();
        }

        function drawResponsibilityGame() {
            let html = `
                <div class="p-4 h-full flex flex-col bg-sp-orange animate-pop relative overflow-hidden">
                    <div class="flex justify-between items-center mb-2 relative z-10">
                        <button onclick="changeScreen('map')" class="bg-white p-3 rounded-full shadow-md">🔙</button>
                        <h2 class="font-black text-orange-900 bg-white/70 px-4 py-1 rounded-full text-lg">Tanggung Jawab 🧹</h2>
                    </div>
                    
                    <p class="text-center font-bold text-orange-900 mb-4 bg-white/50 p-2 rounded-xl relative z-10">Bereskan mainan yang berserakan!</p>

                    <!-- Toy Box -->
                    <div id="toybox" class="absolute bottom-10 left-1/2 transform -translate-x-1/2 text-8xl z-10">
                        📦
                    </div>
            `;

            gameData.toys.forEach(t => {
                html += `
                    <div id="${t.id}" class="absolute text-5xl cursor-pointer transition-all duration-700 ease-in-out hover:scale-110 z-20" 
                         style="top: ${t.top}; left: ${t.left};" 
                         onclick="handleToyTap('${t.id}')">
                        ${t.icon}
                    </div>
                `;
            });

            html += `</div>`;
            app.innerHTML = html;
        }

        window.handleToyTap = function(toyId) {
            const toyEl = document.getElementById(toyId);
            if (!toyEl || toyEl.classList.contains('collected')) return;
            
            toyEl.classList.add('collected');
            playSound('pop');
            
            // Animate to box
            const box = document.getElementById('toybox');
            const boxRect = box.getBoundingClientRect();
            const appRect = document.getElementById('app').getBoundingClientRect();
            
            // Calculate relative position to move to the box
            const targetTop = (boxRect.top - appRect.top) + 20 + 'px';
            const targetLeft = (boxRect.left - appRect.left) + 20 + 'px';

            toyEl.style.top = targetTop;
            toyEl.style.left = targetLeft;
            toyEl.style.transform = 'scale(0.2)';
            toyEl.style.opacity = '0';

            gameData.toysLeft--;

            if (gameData.toysLeft > 0) {
                speak(["Pintar!", "Bagus!", "Satu lagi!"][Math.floor(Math.random()*3)]);
            }

            if (gameData.toysLeft === 0) {
                setTimeout(() => {
                    playSound('success');
                    box.classList.add('animate-bounce');
                    setTimeout(() => winLevel(3, "Luar biasa! Kamu anak yang bertanggung jawab karena sudah merapikan mainanmu sendiri."), 1500);
                }, 800);
            }
        };

        function winLevel(starsEarned, reflectionText) {
            // Update progress
            const world = state.currentWorld;
            if (state.progress[world].stars < starsEarned) {
                const diff = starsEarned - state.progress[world].stars;
                state.progress[world].stars = starsEarned;
                state.totalStars += diff;
            }
            
            // Unlock next level logic
            if (world === 'honesty') state.progress['responsibility'].unlocked = true;
            if (world === 'responsibility') state.progress['discipline'].unlocked = true; // Just logic, game 3 not built yet

            createConfetti();
            playSound('success');
            
            app.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-6 bg-gradient-to-b from-yellow-200 to-yellow-400 animate-pop relative">
                    <div class="text-8xl mb-4 animate-bounce">🏆</div>
                    <div class="flex gap-2 mb-6 text-5xl">
                        <span class="animate-pop" style="animation-delay: 0.1s">⭐</span>
                        <span class="animate-pop" style="animation-delay: 0.3s">⭐</span>
                        <span class="animate-pop" style="animation-delay: 0.5s">⭐</span>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl text-center mb-8 w-full">
                        <h2 class="text-2xl font-black text-yellow-800 mb-2">Misi Selesai!</h2>
                        <p class="text-yellow-900 font-bold leading-relaxed">"${reflectionText}"</p>
                    </div>
                    <button onclick="changeScreen('map')" class="btn-game bg-blue-500 text-white text-2xl font-black py-4 px-10 rounded-full border-4 border-white">
                        Lanjut Petualangan! 🚀
                    </button>
                </div>
            `;
            
            speak(reflectionText);
        }

        function renderDashboard() {
            speak("Area Orang Tua. Di sini Anda bisa melihat perkembangan anak.");
            let html = `
                <div class="p-6 h-full flex flex-col bg-white animate-pop">
                    <div class="flex items-center gap-4 mb-6">
                        <button onclick="changeScreen('menu')" class="bg-gray-200 p-3 rounded-full shadow-sm text-xl">🔙</button>
                        <h2 class="text-2xl font-black text-gray-800">Area Orang Tua 📊</h2>
                    </div>
                    
                    <div class="glass-panel bg-blue-50 p-6 rounded-3xl mb-6 text-center shadow-sm">
                        <div class="text-4xl mb-2">⭐ ${state.totalStars}</div>
                        <p class="font-bold text-gray-600">Total Bintang Terkumpul</p>
                    </div>

                    <h3 class="font-bold text-lg text-gray-700 mb-4 px-2">Perkembangan Karakter</h3>
                    <div class="flex-1 overflow-y-auto space-y-3 px-2 pb-10">
            `;

            worlds.forEach(w => {
                const p = state.progress[w.id];
                const percentage = p.unlocked ? (p.stars / 3) * 100 : 0;
                html += `
                    <div class="mb-4">
                        <div class="flex justify-between text-sm font-bold text-gray-600 mb-1">
                            <span>${w.icon} ${w.name.split(' ')[1] || w.name}</span>
                            <span>${p.stars}/3</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-4">
                            <div class="${w.color} h-4 rounded-full transition-all duration-1000" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="mt-4 p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                        <p class="text-xs text-gray-600 text-center">
                            Aplikasi ini melatih aspek kognitif dan motorik halus melalui interaksi sentuh, serta menanamkan nilai moral secara audio-visual.
                        </p>
                    </div>
                </div>
            `;
            app.innerHTML = html;
        }

        // Initialize App
        window.onload = () => {
            renderMenu();
        };
    </script>
</body>
</html>
