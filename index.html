<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SensePlay Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { nunito: ['Nunito', 'sans-serif'] },
                    colors: {
                        'sp-blue': '#87CEEB', 'sp-green': '#98FB98',
                        'sp-yellow': '#FFFACD', 'sp-pink': '#FFB6C1',
                        'sp-purple': '#DDA0DD', 'sp-orange': '#FFDAB9'
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s infinite',
                        'pulse-fast': 'pulse 1s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        wiggle: { '0%, 100%': { transform: 'rotate(-5deg)' }, '50%': { transform: 'rotate(5deg)' } },
                        pop: { '0%': { transform: 'scale(0.8)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .glass-panel {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border: 3px solid rgba(255,255,255,0.9);
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .btn-game {
            transition: all 0.15s ease;
            box-shadow: 0 6px 0 rgba(0,0,0,0.18);
        }
        .btn-game:active { transform: translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
        .selected-item { box-shadow: 0 0 0 5px #FFD700, 0 0 20px rgba(255,215,0,0.5); transform: scale(1.12); }
        .star-particle {
            position: absolute;
            font-size: 2rem;
            animation: fall 2.5s linear forwards;
            pointer-events: none;
            z-index: 60;
        }
        @keyframes fall {
            0% { transform: translateY(-60px) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(540deg) scale(0.3); opacity: 0; }
        }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-2deg); }
            40% { transform: translateX(8px) rotate(2deg); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        .solved-item { opacity: 0.35; pointer-events: none; transform: scale(0.8); }
        .world-card { transition: transform 0.2s, box-shadow 0.2s; }
        .world-card:active { transform: scale(0.97); }
        .avatar-btn { transition: all 0.2s; border: 4px solid transparent; }
        .avatar-btn.chosen { border-color: #FFD700; box-shadow: 0 0 12px rgba(255,215,0,0.6); transform: scale(1.1); }
        .sticker-badge { transition: transform 0.3s; }
        .sticker-badge:hover { transform: scale(1.2) rotate(-5deg); }
        .progress-bar-fill { transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .modal-overlay { backdrop-filter: blur(4px); }
        .cloud-drift { animation: cloudDrift 8s ease-in-out infinite; }
        @keyframes cloudDrift { 0%,100% { transform: translateX(0); } 50% { transform: translateX(10px); } }
        .nav-tab { transition: all 0.2s; border-bottom: 3px solid transparent; }
        .nav-tab.active { border-bottom-color: #3B82F6; color: #3B82F6; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }
        .discipline-clock { transition: all 0.3s; }
        .clock-hand { transform-origin: 50% 100%; transition: transform 0.5s; }
        .care-friend { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .care-friend.helped { transform: scale(1.2); filter: brightness(1.2); }
        .tooltip { position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 99; }
        .has-tooltip:hover .tooltip { opacity: 1; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-up { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="w-full">
 
<div id="app" class="relative w-full max-w-sm h-[100dvh] sm:h-[90vh] sm:rounded-3xl shadow-2xl bg-gradient-to-b from-sky-300 to-white overflow-hidden flex flex-col"></div>
 
<script>
// ===================== STATE =====================
const state = {
    currentScreen: 'splash',
    currentWorld: null,
    profile: { name: '', avatar: '🦁', created: false },
    musicOn: true,
    progress: {
        honesty:        { stars: 0, unlocked: true,  playCount: 0 },
        responsibility: { stars: 0, unlocked: false, playCount: 0 },
        discipline:     { stars: 0, unlocked: false, playCount: 0 },
        care:           { stars: 0, unlocked: false, playCount: 0 },
        cooperation:    { stars: 0, unlocked: false, playCount: 0 }
    },
    stickers: [],
    totalStars: 0,
    streak: { count: 0, lastDate: null }
};
 
const worlds = [
    { id: 'honesty',        name: 'Hutan Kejujuran',         color: 'bg-emerald-400',  bg: 'from-emerald-300 to-emerald-100', textColor: 'text-emerald-900', icon: '🐻', desc: 'Kembalikan barang ke pemiliknya.' },
    { id: 'responsibility', name: 'Pulau Tanggung Jawab',    color: 'bg-orange-400',   bg: 'from-orange-300 to-orange-100', textColor: 'text-orange-900', icon: '🧸', desc: 'Bereskan mainan yang berserakan.' },
    { id: 'discipline',     name: 'Kota Disiplin',           color: 'bg-sky-400',      bg: 'from-sky-300 to-sky-100', textColor: 'text-sky-900', icon: '⏰', desc: 'Susun jadwal harian dengan benar.' },
    { id: 'care',           name: 'Taman Kepedulian',        color: 'bg-pink-400',     bg: 'from-pink-300 to-pink-100', textColor: 'text-pink-900', icon: '💖', desc: 'Bantu teman yang kesulitan.' },
    { id: 'cooperation',    name: 'Desa Kerja Sama',         color: 'bg-purple-400',   bg: 'from-purple-300 to-purple-100', textColor: 'text-purple-900', icon: '🤝', desc: 'Pilih tindakan yang tepat bersama!' }
];
 
const avatarList = ['🦁','🐼','🐸','🦊','🐬','🦋','🐧','🐨'];
const stickerRewards = [
    { id: 's1', icon: '🌟', name: 'Bintang Pertama',  condition: () => state.totalStars >= 1 },
    { id: 's2', icon: '🏅', name: 'Pahlawan Jujur',   condition: () => state.progress.honesty.stars >= 3 },
    { id: 's3', icon: '🧹', name: 'Rapi Banget',      condition: () => state.progress.responsibility.stars >= 3 },
    { id: 's4', icon: '⏰', name: 'Tepat Waktu',      condition: () => state.progress.discipline.stars >= 3 },
    { id: 's5', icon: '💖', name: 'Hati Mulia',       condition: () => state.progress.care.stars >= 3 },
    { id: 's6', icon: '🤝', name: 'Tim Hebat',        condition: () => state.progress.cooperation.stars >= 3 },
    { id: 's7', icon: '🏆', name: 'Juara Lengkap',    condition: () => state.totalStars >= 15 },
];
 
// ===================== AUDIO =====================
let audioCtx, bgOscNodes = [];
let musicPlaying = false;
 
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
 
function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'success') {
        osc.type = 'sine';
        [[523.25,0],[659.25,0.1],[783.99,0.2],[1046.5,0.35]].forEach(([f,t]) => osc.frequency.setValueAtTime(f, now+t));
        gain.gain.setValueAtTime(0,now); gain.gain.linearRampToValueAtTime(0.4,now+0.05); gain.gain.exponentialRampToValueAtTime(0.01,now+0.7);
        osc.start(now); osc.stop(now+0.7);
    } else if (type === 'pop') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400,now); osc.frequency.exponentialRampToValueAtTime(800,now+0.12);
        gain.gain.setValueAtTime(0.25,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.12);
        osc.start(now); osc.stop(now+0.12);
    } else if (type === 'error') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(320,now); osc.frequency.linearRampToValueAtTime(200,now+0.25);
        gain.gain.setValueAtTime(0.25,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3);
        osc.start(now); osc.stop(now+0.3);
    } else if (type === 'coin') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880,now); osc.frequency.setValueAtTime(1320,now+0.05);
        gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.2);
        osc.start(now); osc.stop(now+0.2);
    }
}
 
function startBgMusic() {
    if (!audioCtx || musicPlaying || !state.musicOn) return;
    musicPlaying = true;
    const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
    const melody = [0, 2, 4, 2, 0, 4, 2, 0];
    let i = 0;
    function playNote() {
        if (!musicPlaying || !state.musicOn) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.value = notes[melody[i % melody.length]] * 0.5;
        const t = audioCtx.currentTime;
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.06,t+0.05); g.gain.exponentialRampToValueAtTime(0.01,t+0.7);
        o.start(t); o.stop(t+0.7);
        i++;
        bgOscNodes.push(setTimeout(playNote, 700));
    }
    playNote();
}
 
function stopBgMusic() {
    musicPlaying = false;
    bgOscNodes.forEach(t => clearTimeout(t));
    bgOscNodes = [];
}
 
function speak(text, rate = 0.9) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'id-ID'; utt.pitch = 1.2; utt.rate = rate;
    window.speechSynthesis.speak(utt);
}
 
// ===================== UTILS =====================
const app = document.getElementById('app');
 
function changeScreen(screen, arg = null) {
    initAudio();
    playSound('pop');
    state.currentScreen = screen;
    if (arg) state.currentWorld = arg;
    render();
}
 
function createConfetti() {
    const emojis = ['⭐','🌟','✨','🎉','🎊','💫','🌈'];
    for (let i = 0; i < 25; i++) {
        const el = document.createElement('div');
        el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
        el.className = 'star-particle';
        el.style.left = Math.random()*100 + '%';
        el.style.animationDuration = (Math.random()*1.5 + 1.5) + 's';
        el.style.animationDelay = (Math.random()*0.5) + 's';
        el.style.fontSize = (Math.random()*1.2 + 1) + 'rem';
        app.appendChild(el);
        setTimeout(() => el.remove(), 3500);
    }
}
 
function checkStickers() {
    stickerRewards.forEach(s => {
        if (!state.stickers.includes(s.id) && s.condition()) {
            state.stickers.push(s.id);
            showStickerToast(s);
        }
    });
}
 
function showStickerToast(sticker) {
    const toast = document.createElement('div');
    toast.className = 'absolute top-4 left-1/2 z-50 slide-up';
    toast.style.transform = 'translateX(-50%)';
    toast.innerHTML = `<div class="bg-yellow-400 text-yellow-900 font-black px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 text-sm border-2 border-yellow-200">
        ${sticker.icon} Stiker Baru: ${sticker.name}!
    </div>`;
    app.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
 
function updateStreak() {
    const today = new Date().toDateString();
    if (state.streak.lastDate === today) return;
    if (state.streak.lastDate === new Date(Date.now()-86400000).toDateString()) {
        state.streak.count++;
    } else {
        state.streak.count = 1;
    }
    state.streak.lastDate = today;
}
 
// ===================== RENDER =====================
function render() {
    switch(state.currentScreen) {
        case 'splash':     renderSplash(); break;
        case 'profile':    renderProfile(); break;
        case 'menu':       renderMenu(); break;
        case 'map':        renderMap(); break;
        case 'play':       renderLevel(); break;
        case 'dashboard':  renderDashboard(); break;
        case 'stickers':   renderStickers(); break;
    }
}
 
// ===================== SPLASH =====================
function renderSplash() {
    app.innerHTML = `
    <div class="flex-1 flex flex-col items-center justify-center bg-gradient-to-b from-sky-400 via-sky-300 to-white relative overflow-hidden">
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute text-6xl opacity-70 cloud-drift" style="top:8%;left:5%">☁️</div>
            <div class="absolute text-5xl opacity-60" style="top:15%;right:8%;animation:cloudDrift 10s ease-in-out infinite reverse">☁️</div>
            <div class="absolute text-4xl opacity-50 cloud-drift" style="top:25%;left:50%;animation-delay:2s">☁️</div>
        </div>
        <div class="text-8xl mb-3 animate-bounce-slow">🦁</div>
        <h1 class="text-4xl font-black text-white text-center drop-shadow-lg mb-1">SensePlay</h1>
        <h2 class="text-2xl font-black text-yellow-300 text-center drop-shadow mb-3">Adventure</h2>
        <p class="text-white/80 font-bold text-center mb-10 text-sm px-8">Belajar nilai baik lewat petualangan seru!</p>
        <div class="flex gap-2 text-2xl mb-10">
            <span class="animate-bounce" style="animation-delay:0s">⭐</span>
            <span class="animate-bounce" style="animation-delay:0.15s">⭐</span>
            <span class="animate-bounce" style="animation-delay:0.3s">⭐</span>
        </div>
        <button onclick="initAudio(); startBgMusic(); ${state.profile.created ? "changeScreen('menu')" : "changeScreen('profile')"}" 
            class="btn-game bg-yellow-400 text-yellow-900 text-xl font-black py-4 px-14 rounded-full border-4 border-white shadow-xl">
            ${state.profile.created ? `Halo ${state.profile.avatar} ${state.profile.name}! MAIN! 🚀` : 'MULAI PETUALANGAN! 🚀'}
        </button>
    </div>`;
    speak(state.profile.created ? `Halo ${state.profile.name}! Selamat datang kembali!` : "Selamat datang di Sense Play Adventure! Ayo bermain bersama!");
}
 
// ===================== PROFILE SETUP =====================
function renderProfile() {
    let selectedAvatar = state.profile.avatar || '🦁';
    app.innerHTML = `
    <div class="flex-1 flex flex-col bg-gradient-to-b from-purple-300 to-white p-6 overflow-y-auto">
        <h2 class="text-2xl font-black text-purple-800 text-center mb-6 mt-4">Siapa kamu? 👋</h2>
        
        <div class="glass-panel rounded-3xl p-5 mb-5 text-center">
            <p class="font-bold text-gray-600 mb-3 text-sm">Pilih avatar favoritmu!</p>
            <div class="grid grid-cols-4 gap-3" id="avatarGrid">
                ${avatarList.map(av => `
                    <button onclick="selectAvatar('${av}')" id="av-${av}" 
                        class="avatar-btn text-3xl w-14 h-14 rounded-2xl bg-white shadow-sm flex items-center justify-center mx-auto ${av === selectedAvatar ? 'chosen' : ''}">
                        ${av}
                    </button>`).join('')}
            </div>
        </div>
 
        <div class="glass-panel rounded-3xl p-5 mb-6">
            <p class="font-bold text-gray-600 mb-2 text-sm">Nama panggilanmu?</p>
            <input id="playerName" type="text" maxlength="12" placeholder="Tulis namamu..." 
                value="${state.profile.name}"
                class="w-full border-3 border-purple-300 rounded-2xl px-4 py-3 text-lg font-bold text-center focus:outline-none focus:border-purple-500 bg-white"
                style="border-width:3px">
        </div>
 
        <button onclick="saveProfile()" 
            class="btn-game bg-purple-500 text-white text-xl font-black py-4 rounded-full border-4 border-white shadow-xl">
            Ayo Petualangan! 🚀
        </button>
    </div>`;
    speak("Halo! Siapakah namamu? Pilih avatar favoritmu ya!");
    
    window.selectAvatar = function(av) {
        selectedAvatar = av;
        avatarList.forEach(a => {
            const el = document.getElementById('av-'+a);
            if (el) { el.classList.remove('chosen'); }
        });
        document.getElementById('av-'+av)?.classList.add('chosen');
        playSound('pop');
    };
    
    window.saveProfile = function() {
        const nameEl = document.getElementById('playerName');
        const name = nameEl ? nameEl.value.trim() : '';
        if (!name) { nameEl?.classList.add('shake'); setTimeout(()=>nameEl?.classList.remove('shake'),500); speak("Tulis namamu dulu ya!"); return; }
        state.profile.name = name;
        state.profile.avatar = selectedAvatar;
        state.profile.created = true;
        playSound('success');
        updateStreak();
        changeScreen('menu');
    };
}
 
// ===================== MENU =====================
function renderMenu() {
    startBgMusic();
    const totalPossible = worlds.length * 3;
    const pct = Math.round((state.totalStars / totalPossible) * 100);
    app.innerHTML = `
    <div class="flex-1 flex flex-col bg-gradient-to-b from-sky-300 to-white relative overflow-hidden">
        <!-- Top bar -->
        <div class="flex justify-between items-center px-4 pt-4 pb-2">
            <div class="flex items-center gap-2">
                <div class="text-3xl">${state.profile.avatar}</div>
                <div>
                    <p class="font-black text-sky-800 text-sm leading-none">${state.profile.name}</p>
                    <p class="text-xs text-sky-600 font-bold">🔥 ${state.streak.count} hari berturut</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="state.musicOn=!state.musicOn; state.musicOn?startBgMusic():stopBgMusic(); this.textContent=state.musicOn?'🔊':'🔇'; playSound('pop')" 
                    class="bg-white/60 rounded-full p-2 text-lg font-bold shadow-sm">${state.musicOn?'🔊':'🔇'}</button>
                <div class="bg-yellow-300 px-3 py-1.5 rounded-full font-black text-yellow-800 text-sm shadow-md flex items-center gap-1">
                    ⭐ ${state.totalStars}
                </div>
            </div>
        </div>
 
        <!-- Hero -->
        <div class="flex flex-col items-center py-4 relative">
            <div class="absolute top-0 left-4 text-5xl opacity-70 cloud-drift">☁️</div>
            <div class="absolute top-6 right-4 text-4xl opacity-60" style="animation:cloudDrift 9s ease-in-out infinite reverse">☁️</div>
            <div class="text-7xl mb-1 animate-float">${state.profile.avatar}</div>
            <h1 class="text-2xl font-black text-sky-700 drop-shadow">SensePlay Adventure</h1>
            <p class="text-sky-600 font-bold text-sm">Main sambil jadi anak hebat!</p>
            
            <!-- Overall Progress -->
            <div class="mt-3 w-[80%] bg-white/60 rounded-full h-3 shadow-inner">
                <div class="progress-bar-fill h-3 rounded-full bg-gradient-to-r from-yellow-400 to-green-400 shadow" style="width:${pct}%"></div>
            </div>
            <p class="text-xs text-sky-700 font-bold mt-1">${state.totalStars}/${totalPossible} Bintang ✨</p>
        </div>
 
        <!-- Buttons -->
        <div class="flex flex-col items-center gap-3 px-6 pb-4">
            <button onclick="changeScreen('map')" class="btn-game w-full bg-green-400 text-white text-xl font-black py-4 rounded-full border-4 border-white shadow-xl">
                🗺️ Mulai Petualangan!
            </button>
            <div class="flex gap-3 w-full">
                <button onclick="changeScreen('stickers')" class="btn-game flex-1 bg-yellow-400 text-yellow-900 font-black py-3 rounded-full border-3 border-white shadow-md text-sm" style="border-width:3px">
                    🏅 Stiker (${state.stickers.length}/${stickerRewards.length})
                </button>
                <button onclick="changeScreen('dashboard')" class="btn-game flex-1 bg-blue-400 text-white font-black py-3 rounded-full border-3 border-white shadow-md text-sm" style="border-width:3px">
                    📊 Laporan
                </button>
            </div>
            <button onclick="changeScreen('profile')" class="text-sky-600 font-bold text-xs underline mt-1">
                Ganti nama / avatar
            </button>
        </div>
    </div>`;
    speak(`Halo ${state.profile.name}! Mau petualangan apa hari ini?`);
}
 
// ===================== MAP =====================
function renderMap() {
    let html = `
    <div class="p-4 h-full flex flex-col bg-gradient-to-b from-sky-200 to-white animate-pop">
        <div class="flex justify-between items-center mb-4">
            <button onclick="changeScreen('menu')" class="bg-white p-3 rounded-full shadow-md text-xl">🏠</button>
            <h2 class="font-black text-sky-700 text-lg">Peta Petualangan 🗺️</h2>
            <div class="bg-yellow-300 px-3 py-1.5 rounded-full font-black text-yellow-800 text-sm shadow flex items-center gap-1">⭐ ${state.totalStars}</div>
        </div>
        <div class="flex-1 overflow-y-auto space-y-3 pb-4">`;
 
    worlds.forEach((w, idx) => {
        const isUnlocked = state.progress[w.id].unlocked;
        const stars = state.progress[w.id].stars;
        const isPlayable = w.id !== 'cooperation';
        html += `
        <div class="world-card glass-panel p-4 rounded-3xl flex items-center gap-3 ${isUnlocked && isPlayable ? 'cursor-pointer' : 'opacity-60 grayscale'}"
             onclick="${isUnlocked && isPlayable ? `changeScreen('play','${w.id}')` : isUnlocked ? `alertCustom('Dunia ini akan segera hadir! 🚧')` : `alertCustom('Selesaikan dunia sebelumnya dulu ya! 🔒')`}">
            <div class="${w.color} w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-inner border-2 border-white flex-shrink-0">
                ${isUnlocked ? w.icon : '🔒'}
            </div>

// ---- WIN LEVEL ----
function winLevel(starsEarned, reflectionText) {
    updateStreak();
    const world = state.currentWorld;
    const prog = state.progress[world];
    if (prog.stars < starsEarned) {
        state.totalStars += starsEarned - prog.stars;
        prog.stars = starsEarned;
    }
    prog.playCount++;
    const unlockMap = { honesty: 'responsibility', responsibility: 'discipline', discipline: 'care', care: 'cooperation' };
    if (unlockMap[world]) state.progress[unlockMap[world]].unlocked = true;
    
    createConfetti();
    playSound('success');
    checkStickers();
    
    app.innerHTML = `

    drawHonestyGame();
    speak(`Kamu memilih ${item.name}. Punya siapa ya?`);

window.handleOwnerTap = function(ownerId) {
    if (!gameData.selectedItem) { speak("Pilih barangnya dulu ya!"); return; }
    const owner = gameData.owners.find(o => o.id === ownerId);
    const item = gameData.items.find(i => i.id === gameData.selectedItem);
    if (owner.solved) return;
    if (owner.expects === gameData.selectedItem) {
        playSound('success');
        owner.solved = true;
        item.solved = true;
        gameData.selectedItem = null;
        gameData.matchesLeft--;
        speak(`Pintar! ${item.name} memang milik ${owner.name}!`);
        drawHonestyGame();
        if (gameData.matchesLeft === 0) {
            setTimeout(() => winLevel(3, "Hebat! Kamu sudah menunjukkan kejujuran dengan mengembalikan barang milik orang lain. Anak jujur itu disayang semua orang!"), 1500);
        }
    } else {
        playSound('error');
        const el = document.getElementById(`owner-${ownerId}`);
        el?.classList.add('shake');
        setTimeout(() => el?.classList.remove('shake'), 500);
        gameData.selectedItem = null;
        drawHonestyGame();
        speak(`Hmm, ${item.name} sepertinya bukan milik ${owner.name}. Coba yang lain!`);
    }
};

    gameData.selected = gameData.selected === id ? null : id;

    drawDisciplineGame();
    if (gameData.selected) speak(`Kamu memilih ${gameData.schedule.find(a=>a.id===id)?.label}. Taruh di urutan berapa?`);
};
 
window.handleSlotTap = function(slotIdx) {
    if (!gameData.selected) { speak("Pilih kegiatannya dulu!"); return; }
    const act = gameData.schedule.find(a => a.id === gameData.selected);
    if (!act) return;
    if (act.order === slotIdx + 1) {
        act.placed = true;
        gameData.slots[slotIdx] = act.id;
        gameData.selected = null;
        playSound('success');
        speak(`Betul! ${act.label} ada di urutan ke-${act.order}!`);
        drawDisciplineGame();
        if (gameData.schedule.every(a => a.placed)) {
            setTimeout(() => winLevel(3, "Keren! Kamu tahu cara mengatur jadwal harian yang baik. Anak disiplin selalu menyelesaikan tugasnya tepat waktu!"), 1000);
        }
    } else {
        gameData.errors++;
        playSound('error');
        const slot = document.querySelector(`[onclick="handleSlotTap(${slotIdx})"]`);
        slot?.classList.add('shake');
        setTimeout(() => slot?.classList.remove('shake'), 500);
        gameData.selected = null;
        drawDisciplineGame();
        speak(`Hmm, sepertinya ${act.label} bukan urutan ke-${slotIdx+1}. Coba lagi!`);
    }
};

    gameData.currentScenario++;
    if (gameData.currentScenario >= gameData.scenarios.length) {
        const stars = gameData.correctCount >= 3 ? 3 : gameData.correctCount >= 2 ? 2 : 1;
        winLevel(stars, `Kamu mendapat ${gameData.correctCount} dari 3 pilihan tepat! Anak yang peduli selalu hadir saat teman membutuhkan bantuan. Terus jaga kepedulianmu!`);
    } else {
        drawCareGame();
    }
};
